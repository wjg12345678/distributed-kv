name: 持续集成

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: 构建与测试

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            libprotobuf-dev \
            librocksdb-dev \
            libabsl-dev

      - name: 配置
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: 构建
        run: cmake --build build

      - name: 测试
        run: ctest --test-dir build --output-on-failure
