syntax = "proto3";

package distributedkv.raft;

message PeerEndpoint {
  int32 id = 1;
  string host = 2;
  int32 raft_port = 3;
  int32 http_port = 4;
}

enum CommandType {
  COMMAND_TYPE_NOOP = 0;
  COMMAND_TYPE_PUT = 1;
  COMMAND_TYPE_ADD_PEER = 2;
  COMMAND_TYPE_REMOVE_PEER = 3;
  COMMAND_TYPE_BEGIN_JOINT_CONFIG = 4;
  COMMAND_TYPE_FINALIZE_CONFIG = 5;
  COMMAND_TYPE_ACQUIRE_LOCK = 6;
  COMMAND_TYPE_RELEASE_LOCK = 7;
  COMMAND_TYPE_MVCC_COMMIT = 8;
}

message KeyValue {
  string key = 1;
  string value = 2;
}

message Command {
  CommandType type = 1;
  string key = 2;
  string value = 3;
  PeerEndpoint peer = 4;
  string request_id = 5;
  uint64 mvcc_commit_ts = 6;
  repeated KeyValue writes = 7;
  repeated int32 config_voters = 8;
  repeated int32 config_next_voters = 9;
  repeated PeerEndpoint config_peers = 10;
}

message LogEntry {
  int32 term = 1;
  Command command = 2;
}

message RequestVoteRequest {
  int32 term = 1;
  int32 candidate_id = 2;
  int32 last_log_index = 3;
  int32 last_log_term = 4;
}

message RequestVoteResponse {
  int32 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  int32 term = 1;
  int32 leader_id = 2;
  int32 prev_log_index = 3;
  int32 prev_log_term = 4;
  int32 leader_commit = 5;
  repeated LogEntry entries = 6;
}

message AppendEntriesResponse {
  int32 term = 1;
  bool success = 2;
  int32 match_index = 3;
  int32 conflict_index = 4;
  int32 conflict_term = 5;
}

message InstallSnapshotRequest {
  int32 term = 1;
  int32 leader_id = 2;
  int32 last_included_index = 3;
  int32 last_included_term = 4;
  repeated KeyValue state = 5;
  repeated int32 voters = 6;
  repeated int32 next_voters = 7;
  bool joint = 8;
  repeated PeerEndpoint peers = 9;
}

message InstallSnapshotResponse {
  int32 term = 1;
  bool success = 2;
  int32 last_included_index = 3;
}

message RpcEnvelope {
  oneof payload {
    RequestVoteRequest request_vote_request = 1;
    RequestVoteResponse request_vote_response = 2;
    AppendEntriesRequest append_entries_request = 3;
    AppendEntriesResponse append_entries_response = 4;
    InstallSnapshotRequest install_snapshot_request = 5;
    InstallSnapshotResponse install_snapshot_response = 6;
    RequestVoteRequest pre_vote_request = 7;
    RequestVoteResponse pre_vote_response = 8;
  }
}
